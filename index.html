<script>
const API_KEY = "623474460dfb40f392a9e6907bfba8ea";
const ALL_ASSETS = [{symbol:"XAU/USD", label:"XAU/USD", market:"Commodity"}];
let allResults = [], lastPos = {}, srData = JSON.parse(localStorage.getItem("oliver_sr")||"{}");

function calcSMA(arr,p){ if(!arr||arr.length<p)return null; return arr.slice(-p).reduce((a,b)=>a+b,0)/p; }
function getProx(pct){ const a=Math.abs(pct); if(a<0.5)return{label:"Muito próximo",color:"#d97706",icon:"🎯"}; if(a<2)return{label:"Próximo",color:"#ca8a04",icon:"📍"}; return{label:"Distante",color:"#94a3b8",icon:"📏"}; }
function fmt(p){ if(p==null)return"—"; if(p>10000)return p.toFixed(0); if(p>100)return p.toFixed(2); return p.toFixed(4); }

function calcRSI(closes, period=14){
  if(!closes || closes.length < period+1) return null;
  let gains=0, losses=0;
  for(let i=closes.length-period; i<closes.length; i++){
    const diff = closes[i]-closes[i-1];
    if(diff>0) gains+=diff; else losses+=Math.abs(diff);
  }
  const avgGain = gains/period;
  const avgLoss = losses/period;
  if(avgLoss===0) return 100;
  const rs = avgGain/avgLoss;
  return 100-(100/(1+rs));
}

async function fetchRSI(symbol){
  try{
    const [m15, h1, d1, w1] = await Promise.all([
      tdFetch(symbol,"15min",50),
      tdFetch(symbol,"1h",50),
      tdFetch(symbol,"1day",50),
      tdFetch(symbol,"1week",30),
    ]);
    return {
      m15: calcRSI(m15.map(v=>parseFloat(v.close))),
      h1:  calcRSI(h1.map(v=>parseFloat(v.close))),
      d1:  calcRSI(d1.map(v=>parseFloat(v.close))),
      w1:  calcRSI(w1.map(v=>parseFloat(v.close))),
    };
  }catch(e){ console.warn("RSI fetch error:", e.message); return null; }
}

async function tdFetch(sym, interval, size){
  const r = await fetch(`https://api.twelvedata.com/time_series?symbol=${encodeURIComponent(sym)}&interval=${interval}&outputsize=${size}&apikey=${API_KEY}&dp=6`);
  if(!r.ok) throw new Error("HTTP "+r.status);
  const j = await r.json();
  if(j.status==="error") throw new Error(j.message);
  return j.values.reverse();
}

// ─── SETUPS OLIVER VELEZ ─────────────────────────────────────────────────────
function detectSetups(candles, sma8, sma20){
  const setups = [];
  const n = candles.length;
  if(n < 5) return setups;

  // Candle helpers
  const c  = candles[n-1]; // atual
  const p1 = candles[n-2]; // anterior
  const p2 = candles[n-3];
  const p3 = candles[n-4];
  const p4 = candles[n-5];

  const body  = v => Math.abs(v.close - v.open);
  const range = v => v.high - v.low;
  const isBull = v => v.close > v.open;
  const isBear = v => v.close < v.open;
  const tailDown = v => Math.min(v.open,v.close) - v.low;
  const tailUp   = v => v.high - Math.max(v.open,v.close);

  // Média do corpo dos últimos 20 candles
  const last20 = candles.slice(-21,-1);
  const avgBody  = last20.reduce((s,v)=>s+body(v),0)/last20.length;
  const avgRange = last20.reduce((s,v)=>s+range(v),0)/last20.length;

  // ── LOC ──────────────────────────────────────────────────────────────────────
  function getLOC(price, s8, s20){
    if(!s8||!s20) return null;
    const d8  = Math.abs((price-s8)/s8*100);
    const d20 = Math.abs((price-s20)/s20*100);
    const near8  = d8  < 0.3;
    const near20 = d20 < 0.5;
    const far20  = d20 > 1.5;
    if(near8 && near20)  return 1;
    if(!near8 && near20) return 2;
    if(near8 && !near20) return 3;
    if(far20)            return 4;
    return 5;
  }

  const loc = getLOC(c.close, sma8, sma20);
  const locLabel = loc ? `LOC${loc}` : "";
  const locColor = {1:"#16a34a",2:"#2563eb",3:"#d97706",4:"#7c3aed",5:"#94a3b8"}[loc]||"#94a3b8";

  // ── BE — Barra Elefante ───────────────────────────────────────────────────
  if(body(c) >= avgBody * 3){
    const dir = isBull(c)?"BULL":"BEAR";
    setups.push({name:"🐘 BE "+dir, color:isBull(c)?"#16a34a":"#dc2626", loc, locLabel, locColor,
      desc:`Barra Elefante ${dir} — Big Players presentes`});
  }

  // ── NRB — Narrow Range Bar ────────────────────────────────────────────────
  if(range(c) < avgRange * 0.3){
    setups.push({name:"🔬 NRB", color:"#7c3aed", loc, locLabel, locColor,
      desc:"Narrow Range Bar — compressão, movimento iminente"});
  }

  // ── BT — Bottoming Tail ───────────────────────────────────────────────────
  if(range(c)>0 && tailDown(c)/range(c) >= 0.66){
    setups.push({name:"📍 BT", color:"#16a34a", loc, locLabel, locColor,
      desc:"Bottoming Tail — sinal de fundo"});
  }

  // ── TT — Topping Tail ─────────────────────────────────────────────────────
  if(range(c)>0 && tailUp(c)/range(c) >= 0.66){
    setups.push({name:"📍 TT", color:"#dc2626", loc, locLabel, locColor,
      desc:"Topping Tail — sinal de topo"});
  }

  // ── Bull/Bear 180 ─────────────────────────────────────────────────────────
  if(isBull(p1) && isBear(c) && body(p1)>avgBody*0.5 && body(c)>avgBody*0.5)
    setups.push({name:"🔄 BEAR 180", color:"#dc2626", loc, locLabel, locColor,
      desc:"Bear 180 — virada vendedora"});
  if(isBear(p1) && isBull(c) && body(p1)>avgBody*0.5 && body(c)>avgBody*0.5)
    setups.push({name:"🔄 BULL 180", color:"#16a34a", loc, locLabel, locColor,
      desc:"Bull 180 — virada compradora"});

  // ── GBR — Green Bar Reversal (3-5 vermelhos + verde) ─────────────────────
  const prev5 = [p4,p3,p2,p1];
  const consRed  = [p1,p2,p3,p4].findIndex(v=>!isBear(v));
  const consGreen= [p1,p2,p3,p4].findIndex(v=>!isBull(v));
  if(isBull(c) && (consRed===-1?4:consRed)>=2)
    setups.push({name:"🟢 GBR", color:"#16a34a", loc, locLabel, locColor,
      desc:"Green Bar Reversal — fundo potencial"});
  if(isBear(c) && (consGreen===-1?4:consGreen)>=2)
    setups.push({name:"🔴 RBR", color:"#dc2626", loc, locLabel, locColor,
      desc:"Red Bar Reversal — topo potencial"});

  // ── RBTO — Red Bar Take Out ───────────────────────────────────────────────
  if(isBear(p1) && isBull(c) && c.close > p1.high)
    setups.push({name:"📈 RBTO", color:"#16a34a", loc, locLabel, locColor,
      desc:"Red Bar Take Out — compra confirmada"});

  // ── GBTO — Green Bar Take Out ─────────────────────────────────────────────
  if(isBull(p1) && isBear(c) && c.close < p1.low)
    setups.push({name:"📉 GBTO", color:"#dc2626", loc, locLabel, locColor,
      desc:"Green Bar Take Out — venda confirmada"});

  // ── RBI — Red Bar Ignored ─────────────────────────────────────────────────
  if(isBear(p1) && body(p1)<avgBody*0.5 && isBull(c) && c.close>p1.high)
    setups.push({name:"🚫🔴 RBI", color:"#16a34a", loc, locLabel, locColor,
      desc:"Red Bar Ignored — compra, mínima não pode ser violada"});

  // ── GBI — Green Bar Ignored ───────────────────────────────────────────────
  if(isBull(p1) && body(p1)<avgBody*0.5 && isBear(c) && c.close<p1.low)
    setups.push({name:"🚫🟢 GBI", color:"#dc2626", loc, locLabel, locColor,
      desc:"Green Bar Ignored — venda, máxima não pode ser violada"});

  // ── Regra das 2 Cores ─────────────────────────────────────────────────────
  if(isBull(p2)&&isBull(p1)&&body(p2)>avgBody&&body(p1)>avgBody&&isBear(c)&&c.close<p1.low)
    setups.push({name:"2️⃣ 2 CORES BEAR", color:"#dc2626", loc, locLabel, locColor,
      desc:"Regra das 2 Cores — 2 BEs bull sem continuidade"});
  if(isBear(p2)&&isBear(p1)&&body(p2)>avgBody&&body(p1)>avgBody&&isBull(c)&&c.close>p1.high)
    setups.push({name:"2️⃣ 2 CORES BULL", color:"#16a34a", loc, locLabel, locColor,
      desc:"Regra das 2 Cores — 2 BEs bear sem continuidade"});

  // ── Poder das Duplas ──────────────────────────────────────────────────────
  if(isBull(p1)&&isBull(c)&&c.high>p1.high&&tailUp(c)/range(c)>=0.3&&tailUp(p1)/range(p1)>=0.3)
    setups.push({name:"👥 DUPLA TOPO", color:"#dc2626", loc, locLabel, locColor,
      desc:"Poder das Duplas — topo, sinal de venda"});
  if(isBear(p1)&&isBear(c)&&c.low<p1.low&&tailDown(c)/range(c)>=0.3&&tailDown(p1)/range(p1)>=0.3)
    setups.push({name:"👥 DUPLA FUNDO", color:"#16a34a", loc, locLabel, locColor,
      desc:"Poder das Duplas — fundo, sinal de compra"});

  // ── Marching Bull/Bear ────────────────────────────────────────────────────
  if(isBull(c)&&isBull(p1)&&isBull(p2)&&body(c)>avgBody*0.5)
    setups.push({name:"🟢🟢🟢 MARCHING BULL", color:"#16a34a", loc, locLabel, locColor,
      desc:"Marching Bull — tendência acelerando para cima"});
  if(isBear(c)&&isBear(p1)&&isBear(p2)&&body(c)>avgBody*0.5)
    setups.push({name:"🔴🔴🔴 MARCHING BEAR", color:"#dc2626", loc, locLabel, locColor,
      desc:"Marching Bear — tendência acelerando para baixo"});

  // ── TTTO — Topping Tail Take Out ──────────────────────────────────────────
  if(tailUp(p1)/range(p1)>=0.66 && c.close>p1.high)
    setups.push({name:"⬆️ TTTO", color:"#16a34a", loc, locLabel, locColor,
      desc:"Topping Tail Take Out — compra, TT anulada"});

  // ── BTTO — Bottoming Tail Take Out ────────────────────────────────────────
  if(tailDown(p1)/range(p1)>=0.66 && c.close<p1.low)
    setups.push({name:"⬇️ BTTO", color:"#dc2626", loc, locLabel, locColor,
      desc:"Bottoming Tail Take Out — venda, BT anulada"});

  // ── CAS — Venda de Avanço Climático ──────────────────────────────────────
  if(sma20){
    const distMM20 = (c.close - sma20)/sma20*100;
    if(distMM20 > 2.0 && isBull(c) && body(c)>avgBody)
      setups.push({name:"☄️ CAS", color:"#dc2626", loc, locLabel, locColor,
        desc:"Avanço Climático — preço muito afastado da MM20, venda"});
  }

  return setups;
}

async function fetchAsset(asset){
  try{
    const m5  = await tdFetch(asset.symbol,"5min",210);
    const h1  = await tdFetch(asset.symbol,"1h",55);

    // Candles OHLC completos
    const candles = m5.map(v=>({
      open:  parseFloat(v.open),
      high:  parseFloat(v.high),
      low:   parseFloat(v.low),
      close: parseFloat(v.close),
    }));

    const closes = candles.map(v=>v.close);
    const h1c    = h1.map(v=>parseFloat(v.close));
    const openDay= candles[0].open;
    const price  = closes[closes.length-1];
    const sma200 = calcSMA(closes,200); if(!sma200) return null;
    const sma50  = calcSMA(closes,50);
    const sma20  = calcSMA(closes,20);
    const sma8   = calcSMA(closes,8);
    const pct    = (price-sma200)/sma200*100;
    const pos    = price>sma200?"above":"below";
    const flow   = sma8&&sma20?(sma8>sma20?"bull":"bear"):null;
    const ab50   = sma50?price>sma50:null;
    const ab20   = sma20?price>sma20:null;
    const ab8    = sma8?price>sma8:null;
    const aligned= (pos==="above"&&flow==="bull"&&ab50===true)||(pos==="below"&&flow==="bear"&&ab50===false);
    const h1sma8 = calcSMA(h1c,8), h1sma20=calcSMA(h1c,20), h1sma50=calcSMA(h1c,50);
    const h1p    = h1c[h1c.length-1];
    const h1ab   = h1sma50?h1p>h1sma50:null;
    const dayPct = openDay?((price-openDay)/openDay*100):null;
    const rsi    = await fetchRSI(asset.symbol);

    // Média variação 7 dias
    let avg7d = null;
    try{
      const d7 = await tdFetch(asset.symbol,"1day",8);
      const dC = d7.map(v=>parseFloat(v.close));
      const dV = [];
      for(let i=1;i<dC.length;i++) dV.push(Math.abs((dC[i]-dC[i-1])/dC[i-1]*100));
      avg7d = dV.slice(-7).reduce((a,b)=>a+b,0)/Math.min(dV.length,7);
    }catch(e){}

    // Detectar setups Oliver Velez
    const setups = detectSetups(candles, sma8, sma20);

    return {...asset,price,sma200,sma50,sma20,sma8,pct,prox:getProx(pct),pos,flow,
            ab50,ab20,ab8,aligned,h1ab,dayPct,openDay,rsi,avg7d,setups,candles};
  }catch(e){ console.warn(asset.label,e.message); return null; }
}

function saveSR(){ localStorage.setItem("oliver_sr",JSON.stringify(srData)); }
function openSR(label){
  const val=prompt("Nível e nome opcional (ex: 3280.50, Topo histórico)");
  if(!val)return;
  const parts=val.split(",");
  const v=parseFloat(parts[0].trim());
  if(isNaN(v)){alert("Inválido.");return;}
  const lbl=(parts[1]||"").trim();
  if(!srData[label])srData[label]=[];
  srData[label].push({v,lbl});
  saveSR(); renderResults();
}
function deleteSR(label,idx){ srData[label].splice(idx,1); saveSR(); renderResults(); }
function srHTML(label,price){
  const levels=(srData[label]||[]).slice().sort((a,b)=>b.v-a.v);
  if(!levels.length)return'<span style="font-size:11px;color:#cbd5e1;">Nenhum nível cadastrado</span>';
  return levels.map((l,i)=>{
    const dist=price?((l.v-price)/price*100):null;
    const col=dist>0?"#dc2626":"#16a34a";
    return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #f8fafc;">
      <span style="font-weight:700;font-size:12px;color:${col};">${l.v}</span>
      <span style="flex:1;font-size:11px;color:#94a3b8;">${l.lbl||""}</span>
      ${dist!=null?`<span style="font-size:11px;font-weight:600;color:${col};">${dist>0?"+":""}${dist.toFixed(2)}%</span>`:""}
      <button onclick="deleteSR('${label}',${i})" style="font-size:11px;color:#fca5a5;background:none;border:none;padding:0;">✕</button>
    </div>`;
  }).join("");
}

function smaCell(tf,up){
  if(up===null)return`<div class="sma-cell" style="background:#f8fafc;border-color:#e2e8f0;"><div style="font-size:13px;color:#cbd5e1;text-align:center;">—</div><div style="font-size:9px;color:#94a3b8;text-align:center;margin-top:2px;">${tf}</div></div>`;
  return`<div class="sma-cell" style="background:${up?"#f0fdf4":"#fef2f2"};border-color:${up?"#86efac":"#fca5a5"};"><div style="font-size:14px;font-weight:700;color:${up?"#16a34a":"#dc2626"};text-align:center;">${tf}</div><div style="font-size:9px;font-weight:600;color:${up?"#16a34a":"#dc2626"};opacity:.7;text-align:center;margin-top:2px;">${up?"▲ favor":"▼ contra"}</div></div>`;
}

function cardHTML(a){
  const up=a.pos==="above";
  const pf=Math.min(Math.abs(a.pct)/5*100,100).toFixed(1);
  return `<div class="card" style="border-color:${a.aligned?(up?"#86efac":"#fca5a5"):"#e2e8f0"};">
    <div class="card-accent" style="background:${up?"#16a34a":"#dc2626"};"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;">
      <span style="font-weight:700;font-size:17px;color:#0f172a;">${a.label}</span>
      <span style="font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;background:#ca8a04;color:#fff;">COMMODITY</span>
    </div>
    <div style="background:#f8fafc;border-radius:10px;padding:10px 14px;border:1px solid #f1f5f9;display:flex;align-items:baseline;gap:8px;">
      <span style="font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;">Preço</span>
      <span style="font-size:26px;font-weight:700;color:#0f172a;">${fmt(a.price)}</span>
    </div>
    <div class="sma-status">${smaCell("M60",up)}${smaCell("M15",a.ab50)}${smaCell("M5",a.ab20)}${smaCell("M2",a.ab8)}</div>
    <div>
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
        <span style="font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;">Distância da MM200</span>
        <span style="font-size:10px;font-weight:700;color:${a.prox.color};">${a.prox.icon} ${a.prox.label} · ${a.pct>0?"+":""}${a.pct.toFixed(2)}%</span>
      </div>
      <div class="prox-track"><div class="prox-fill" style="width:${pf}%;background:${a.prox.color};"></div></div>
    </div>
    ${a.dayPct!=null?`<div class="row-info" style="background:${a.dayPct>=0?"#f0fdf4":"#fef2f2"};border-color:${a.dayPct>=0?"#86efac":"#fca5a5"};"><span style="font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.04em;">Variação do dia</span><span style="font-weight:700;font-size:15px;color:${a.dayPct>=0?"#16a34a":"#dc2626"};">${a.dayPct>=0?"▲":"▼"} ${Math.abs(a.dayPct).toFixed(2)}%</span></div>`:""}
    ${a.avg7d!=null?`<div class="row-info" style="background:#f8fafc;border-color:#e2e8f0;"><span style="font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.04em;">Média variação 7 dias</span><span style="font-weight:700;font-size:15px;color:#7c3aed;">± ${a.avg7d.toFixed(2)}%</span></div>`:""}
    ${a.h1ab!=null?`<div class="row-info" style="background:${a.h1ab?"#f0fdf4":"#fef2f2"};border-color:${a.h1ab?"#86efac":"#fca5a5"};"><span style="font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.04em;">Tendência H1</span><span style="font-weight:700;font-size:14px;color:${a.h1ab?"#16a34a":"#dc2626"};">${a.h1ab?"▲ ALTA":"▼ BAIXA"} · ${a.h1ab?"acima":"abaixo"} MM50</span></div>`:""}
    <div style="background:#f8fafc;border-radius:8px;padding:10px 12px;border:1px solid #e2e8f0;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.04em;">Suportes / Resistências</span>
        <button onclick="openSR('${a.label}')" style="font-size:11px;font-weight:700;color:#2563eb;background:none;border:none;">+ Adicionar</button>
      </div>
      ${srHTML(a.label,a.price)}
    </div>

    <!-- Setups Oliver Velez -->
    <div style="border-radius:10px;overflow:hidden;border:1px solid #e2e8f0;">
      <div style="background:#0f172a;padding:8px 12px;display:flex;align-items:center;gap:8px;">
        <span style="font-size:13px;">🎯</span>
        <span style="font-size:11px;font-weight:700;color:#fff;letter-spacing:.06em;text-transform:uppercase;">Setups Detectados</span>
        <span style="margin-left:auto;font-size:10px;color:#94a3b8;">M5 atual</span>
      </div>
      ${(a.setups&&a.setups.length)?a.setups.map(s=>`
        <div style="padding:8px 12px;border-bottom:1px solid #f1f5f9;display:flex;align-items:flex-start;gap:10px;">
          <div style="flex:1;">
            <div style="font-weight:700;font-size:13px;color:${s.color};">${s.name}
              <span style="font-size:10px;font-weight:600;padding:1px 7px;border-radius:20px;background:${s.locColor}22;color:${s.locColor};margin-left:6px;">${s.locLabel}</span>
            </div>
            <div style="font-size:11px;color:#64748b;margin-top:2px;">${s.desc}</div>
          </div>
        </div>`).join("")
      :`<div style="padding:10px 12px;text-align:center;"><span style="font-size:11px;color:#cbd5e1;">Nenhum setup no candle atual</span></div>`}
    </div>

  </div>`;
}

function rsiCardHTML(rsi){
  if(!rsi) return "";
  const tfs = [
    {label:"M15", val:rsi.m15},
    {label:"H1",  val:rsi.h1},
    {label:"D1",  val:rsi.d1},
    {label:"W1",  val:rsi.w1},
  ];
  const cells = tfs.map(tf=>{
    if(tf.val==null) return `<div style="flex:1;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px 8px;text-align:center;">
      <div style="font-size:11px;color:#94a3b8;font-weight:600;margin-bottom:6px;">${tf.label}</div>
      <div style="font-size:20px;font-weight:700;color:#cbd5e1;">—</div>
    </div>`;
    const up  = tf.val >= 50;
    const ext = tf.val >= 70 || tf.val <= 30;
    const col = up ? "#16a34a" : "#dc2626";
    const bg  = up ? "#f0fdf4" : "#fef2f2";
    const brd = up ? "#86efac" : "#fca5a5";
    const tag = tf.val>=70?"Sobrecomprado":tf.val<=30?"Sobrevendido":tf.val>=50?"Força":"Fraqueza";
    return `<div style="flex:1;background:${bg};border:1px solid ${brd};border-radius:10px;padding:14px 8px;text-align:center;${ext?"box-shadow:0 0 0 2px "+col+"44;":""}">
      <div style="font-size:11px;color:${col};font-weight:700;margin-bottom:6px;">${tf.label}</div>
      <div style="font-size:22px;font-weight:700;color:${col};">${tf.val.toFixed(0)}</div>
      <div style="font-size:9px;font-weight:600;color:${col};opacity:.8;margin-top:4px;">${tag}</div>
    </div>`;
  }).join("");
  return `<div style="background:#fff;border-radius:16px;padding:16px;box-shadow:0 1px 6px rgba(0,0,0,0.06);border:1px solid #e2e8f0;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
      <span style="font-size:16px;">📊</span>
      <span style="font-weight:700;font-size:15px;color:#0f172a;">RSI — XAU/USD</span>
      <span style="font-size:10px;color:#94a3b8;margin-left:auto;">Verde ≥ 50 · Vermelho &lt; 50</span>
    </div>
    <div style="display:flex;gap:8px;">${cells}</div>
  </div>`;
}

function renderResults(){
  document.getElementById("loading-state").style.display="none";
  document.getElementById("cards-grid").innerHTML=allResults.map(cardHTML).join("");
  // RSI card
  const rsiWrap = document.getElementById("rsi-card-wrap");
  const rsi = allResults[0]?.rsi;
  if(rsiWrap) rsiWrap.innerHTML = rsiCardHTML(rsi);
}

function playBeep(freq,dur){
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;g.gain.setValueAtTime(0.4,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur/1000);o.start();o.stop(ctx.currentTime+dur/1000);}catch(e){}
}
function showBanner(msg, color){
  const b = document.getElementById("alarm-banner");
  b.style.cssText = `position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 28px;border-radius:12px;font-size:14px;font-weight:700;box-shadow:0 4px 24px rgba(0,0,0,0.18);background:${color};color:#fff;display:block;font-family:'Outfit',sans-serif;`;
  b.textContent = msg;
  setTimeout(()=>b.style.display="none", 6000);
}

let lastSetups = {};
function checkAlarm(){
  allResults.forEach(a=>{
    // Alarme cruzamento MM200
    const prev=lastPos[a.label];
    if(prev&&prev!==a.pos){
      const up=a.pos==="above";
      playBeep(up?1000:600,400);
      showBanner(up?"🔔 XAU/USD cruzou ACIMA da MM200!":"🔔 XAU/USD cruzou ABAIXO da MM200!", up?"#16a34a":"#dc2626");
    }
    lastPos[a.label]=a.pos;

    // Alarme setups Oliver Velez — alerta se setup novo apareceu
    const prevSetupNames = lastSetups[a.label]||[];
    const currSetupNames = (a.setups||[]).map(s=>s.name);
    const newSetups = currSetupNames.filter(s=>!prevSetupNames.includes(s));
    if(newSetups.length){
      playBeep(880, 300);
      setTimeout(()=>playBeep(1100,300),350);
      showBanner("🎯 "+a.label+": "+newSetups.join(" · "), "#7c3aed");
    }
    lastSetups[a.label] = currSetupNames;
  });
}

async function runScan(){
  const btn=document.getElementById("btn-scan");
  const fill=document.getElementById("progress-fill");
  btn.disabled=true; btn.textContent="⏳ Buscando..."; fill.style.width="0%"; allResults=[];
  let done=0;
  const results=await Promise.all(ALL_ASSETS.map(a=>fetchAsset(a).then(r=>{done++;fill.style.width=(done/ALL_ASSETS.length*100)+"%";return r;})));
  allResults=results.filter(r=>r!=null);
  renderResults(); checkAlarm();
  btn.disabled=false; btn.textContent="🔄 Atualizar";
  document.getElementById("last-update").textContent="Atualizado às "+new Date().toLocaleTimeString("pt-BR");
}

const EVENTS=[
  {daily:true,time:"04:00",label:"Abertura Ásia (Tóquio / Xangai)",impact:"low"},

  {daily:true,time:"09:30",label:"Abertura NYSE / NASDAQ",impact:"medium"},
  {daily:true,time:"17:30",label:"Fechamento Europa",impact:"low"},
  {daily:true,time:"22:00",label:"Fechamento NYSE",impact:"low"},
  {day:2,time:"09:30",label:"Dados econômicos EUA",impact:"high"},
  {day:3,time:"09:30",label:"Dados econômicos EUA",impact:"high"},
  {day:3,time:"14:00",label:"Ata do FOMC (quando agendado)",impact:"high"},
  {day:3,time:"15:30",label:"Estoques de Petróleo EIA",impact:"medium"},
  {day:4,time:"09:30",label:"Pedidos de Seguro Desemprego",impact:"high"},
  {day:5,time:"09:30",label:"Payroll / NFP (1ª Sexta do mês)",impact:"high"},
  {day:5,time:"10:00",label:"ISM Manufatura / Serviços",impact:"medium"},
];
const IMP={high:{bg:"#fef2f2",border:"#fca5a5",dot:"#dc2626",label:"Alto"},medium:{bg:"#fffbeb",border:"#fcd34d",dot:"#d97706",label:"Médio"},low:{bg:"#f0fdf4",border:"#86efac",dot:"#16a34a",label:"Baixo"}};

function saveNotes(){
  const text = document.getElementById("notes-area").value;
  localStorage.setItem("oliver_notes", text);
  const s = document.getElementById("notes-saved");
  s.style.visibility="visible";
  clearTimeout(window._noteTimer);
  window._noteTimer = setTimeout(()=>s.style.visibility="hidden", 2000);
}
function loadNotes(){
  const saved = localStorage.getItem("oliver_notes");
  const area = document.getElementById("notes-area");
  if(area) area.value = saved || "Confluências\n\nCDB\nEstado expandido\nRegião de resistência";
}

function renderCalendar(){
  // Força horário de Brasília (UTC-3) independente do fuso do PC
  const nowUTC = Date.now();
  const brtOffset = -3 * 60 * 60 * 1000;
  const nowBRT = new Date(nowUTC + brtOffset);
  const today = nowBRT.getUTCDay();
  const nowMinutes = nowBRT.getUTCHours()*60 + nowBRT.getUTCMinutes();

  const wrap = document.getElementById("calendar-list");
  const list = EVENTS.filter(e=>e.daily||e.day===today).sort((a,b)=>a.time.localeCompare(b.time));
  if(!list.length){wrap.innerHTML='<span style="color:#94a3b8;font-size:13px;">Nenhum evento hoje.</span>';return;}

  const hBRT = String(nowBRT.getUTCHours()).padStart(2,"0");
  const mBRT = String(nowBRT.getUTCMinutes()).padStart(2,"0");

  wrap.innerHTML = `<div style="font-size:10px;color:#94a3b8;margin-bottom:10px;">Agora em Brasília: <b style="color:#0f172a;">${hBRT}:${mBRT}</b></div>`
  + list.map(e=>{
    const s=IMP[e.impact];
    const[h,m]=e.time.split(":");
    const evMinutes = +h*60 + +m;
    const past = evMinutes < nowMinutes;
    return`<div class="cal-item" style="opacity:${past?.45:1};">
      <div style="min-width:46px;font-weight:700;font-size:13px;color:#0f172a;">${e.time}</div>
      <div style="width:8px;height:8px;border-radius:50%;background:${s.dot};flex-shrink:0;"></div>
      <div style="flex:1;font-size:13px;color:#334155;">${e.label}${past?' <span style="font-size:10px;color:#94a3b8;">✓</span>':''}</div>
      <div style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:${s.bg};border:1px solid ${s.border};color:${s.dot};">${s.label}</div>
    </div>`;
  }).join("");
}

let suggestions=JSON.parse(localStorage.getItem("oliver_suggestions")||"[]");
function renderSuggestions(){
  const w=document.getElementById("suggestions-list");
  if(!suggestions.length){w.innerHTML="";return;}
  w.innerHTML=`<div style="font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-bottom:10px;">Sugestões (${suggestions.length})</div>`+suggestions.map(s=>`<div style="background:#f8fafc;border:1px solid #f1f5f9;border-radius:8px;padding:10px 14px;margin-bottom:7px;display:flex;justify-content:space-between;gap:12px;"><span style="font-size:13px;color:#334155;line-height:1.5;">${s.text}</span><span style="font-size:9px;color:#cbd5e1;white-space:nowrap;">${s.date}</span></div>`).join("");
}
function submitSuggestion(){
  const box=document.getElementById("suggestion-box");
  const text=box.value.trim();if(!text)return;
  suggestions.unshift({text,date:new Date().toLocaleDateString("pt-BR")});
  localStorage.setItem("oliver_suggestions",JSON.stringify(suggestions));
  box.value="";
  const fb=document.getElementById("suggestion-feedback");fb.style.visibility="visible";
  setTimeout(()=>fb.style.visibility="hidden",3000);
  renderSuggestions();
}

renderCalendar();
renderSuggestions();
loadNotes();
setInterval(renderCalendar,60000);
</script>
